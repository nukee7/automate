services:

  # ============================
  # PostgreSQL Database
  # ============================
  postgres:
    image: postgres:15
    container_name: taskpilot_postgres
    restart: always

    environment:
      POSTGRES_USER: nikhil
      POSTGRES_PASSWORD: taskpilot
      POSTGRES_DB: taskpilot_db

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data


  # ============================
  # Redis (BullMQ Queue)
  # ============================
  redis:
    image: redis:7
    container_name: taskpilot_redis
    restart: always

    ports:
      - "6379:6379"

    volumes:
      - redis_data:/data


  # ============================
  # Backend API
  # ============================
  backend:
    build: .
    container_name: taskpilot_backend
    restart: always

    ports:
      - "8000:8000"
      - "5555:5555"

    env_file:
      - .env

    depends_on:
      - postgres
      - redis

    volumes:
      - .:/app
      - /app/node_modules

    command: npm run dev


  # ============================
  # BullMQ Worker
  # ============================
  worker:
    build: .
    container_name: taskpilot_worker
    restart: always

    env_file:
      - .env

    depends_on:
      - postgres
      - redis

    volumes:
      - .:/app
      - /app/node_modules

    command: npm run worker


volumes:
  postgres_data:
  redis_data: